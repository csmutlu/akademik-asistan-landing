name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  quality:
    name: Lint · Types · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Biçim kontrolü
        run: npm run format:check

      - name: Tip kontrolü
        run: npm run typecheck

      - name: Testler
        run: npm run test

      - name: Derleme
        run: npm run build
